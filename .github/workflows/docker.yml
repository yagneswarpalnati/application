name: Build and Push Multi-Service Images

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Get latest tag
      - name: Get latest tag
        id: get_tag
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          echo "tag=$tag" >> $GITHUB_OUTPUT

      # 3. Increment version
      - name: Increment version
        id: increment
        run: |
          version=${{ steps.get_tag.outputs.tag }}
          IFS='.' read -r major minor patch <<< "$version"
          patch=$((patch + 1))
          new_version="$major.$minor.$patch"
          echo "new_version=$new_version" >> $GITHUB_OUTPUT

      # 4. Create Git tag
      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.increment.outputs.new_version }}
          git push origin ${{ steps.increment.outputs.new_version }}

      # 5. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7. Build & Push Backend
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./python-image
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/backend:${{ steps.increment.outputs.new_version }}
            ${{ vars.DOCKER_USERNAME }}/backend:latest

      # 8. Build & Push Frontend
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./nextjs-docker
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/frontend:${{ steps.increment.outputs.new_version }}
            ${{ vars.DOCKER_USERNAME }}/frontend:latest